<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>On My Mind - Archive</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0f0f0f;
            color: #fff;
            padding: 20px;
        }
        
        header {
            text-align: center;
            margin-bottom: 40px;
            padding: 20px 0;
        }
        
        h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            color: #fff;
        }
        
        p {
            color: #aaa;
            font-size: 1.1em;
        }
        
        .masonry {
            column-count: 4;
            column-gap: 20px;
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .grid-item {
            break-inside: avoid;
            margin-bottom: 20px;
            background: #1a1a1a;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.3s, box-shadow 0.3s;
            box-shadow: 0 2px 8px rgba(0,0,0,0.3);
        }
        
        .grid-item:hover {
            transform: translateY(-5px);
            box-shadow: 0 8px 16px rgba(0,0,0,0.5);
        }
        
        .grid-item img {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .grid-item p {
            padding: 12px;
            font-size: 0.95em;
            color: #ddd;
        }
        
        @media (max-width: 1200px) {
            .masonry {
                column-count: 3;
            }
        }
        
        @media (max-width: 768px) {
            .masonry {
                column-count: 2;
            }
        }
        
        @media (max-width: 480px) {
            .masonry {
                column-count: 1;
            }
        }
    </style>
</head>
<body>
    <header>
        <h1>On My Mind</h1>
        <p>A curated archive of inspiration</p>
    </header>
    
    <main>
        <div class="masonry">
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x400?text=Item+1" alt="Archive item 1">
                <p>First memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x350?text=Item+2" alt="Archive item 2">
                <p>Second memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x420?text=Item+3" alt="Archive item 3">
                <p>Third memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x380?text=Item+4" alt="Archive item 4">
                <p>Fourth memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x400?text=Item+5" alt="Archive item 5">
                <p>Fifth memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x360?text=Item+6" alt="Archive item 6">
                <p>Sixth memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x410?text=Item+7" alt="Archive item 7">
                <p>Seventh memory</p>
            </div>
            <div class="grid-item">
                <img src="https://via.placeholder.com/300x390?text=Item+8" alt="Archive item 8">
                <p>Eighth memory</p>
            </div>
        </div>
    </main>
</body>
</html>
